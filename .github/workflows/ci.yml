name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Check suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Show runtimes
        run: |
          python3 --version
          node --version

      - name: Validate schemas, manifests, and CLI core
        run: |
          python3 scripts/check_initial_operation_schemas.py
          python3 scripts/check_cli_core.py
          python3 scripts/check_mcp_wrapper_packageability.py

      - name: Validate adapter conformance
        run: |
          python3 scripts/check_command_adapter_failure_conformance.py
          python3 scripts/check_lifecycle_write_conformance.py
          python3 scripts/check_local_project_adapter.py

      - name: Test wrappers
        run: |
          node wrappers/openclaw/test.js
          node wrappers/mcp/test.js

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
